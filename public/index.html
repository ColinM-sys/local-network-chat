<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Room</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <div class="container">
        <!-- Home Screen -->
        <div id="home-screen" class="screen">
            <div class="join-box">
                <h1>Quick Chat</h1>
                <p class="room-info">No signup required</p>
                <div class="options">
                    <button id="join-lobby-btn" class="btn primary">Join Public Chat</button>
                    <div class="divider">or</div>
                    <button id="create-private-btn" class="btn secondary">Create Private Chat</button>
                </div>
            </div>
        </div>

        <!-- Private Room Created Screen -->
        <div id="private-created-screen" class="screen hidden">
            <div class="join-box">
                <h1>Private Chat Created</h1>
                <p class="room-info">Share this link with others to chat privately:</p>
                <div class="link-box">
                    <input type="text" id="private-link" readonly>
                    <button id="copy-private-link-btn" class="btn small">Copy</button>
                </div>
                <button id="join-private-btn" class="btn primary">Enter Chat</button>
            </div>
        </div>

        <!-- Join Screen (for entering nickname) -->
        <div id="join-screen" class="screen hidden">
            <div class="join-box">
                <h1>Enter Chat</h1>
                <p id="room-info" class="room-info"></p>
                <input type="text" id="username-input" placeholder="Enter your nickname" maxlength="20">
                <button id="join-btn" class="btn primary">Join Chat</button>
            </div>
        </div>

        <!-- Chat Screen -->
        <div id="chat-screen" class="screen hidden">
            <header class="chat-header">
                <div class="room-name">
                    <span id="current-room">Room: lobby</span>
                    <span id="user-count" class="user-count">0 online</span>
                </div>
                <button id="copy-link-btn" class="btn small">Copy Link</button>
            </header>
            <div id="messages" class="messages"></div>
            <form id="message-form" class="message-form">
                <input type="text" id="message-input" placeholder="Type a message..." autocomplete="off">
                <button type="submit" class="btn primary">Send</button>
            </form>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/js/main.js"></script>
</body>
</html>
